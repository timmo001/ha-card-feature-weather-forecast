name: HACS validation

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:

jobs:
  validate:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: HACS validation
        uses: "hacs/action@main"
        with:
          category: "plugin"
